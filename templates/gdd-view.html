<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root{--bg:#ffffff;--fg:#1a1a2e;--muted:#6b7280;--accent:#4f46e5;--border:#e5e7eb;
        --sidebar:#f8f9fc;--code-bg:#f3f4f6;--hl:#ffe8a3;}
  [data-theme="dark"]{--bg:#0f1117;--fg:#e4e6eb;--muted:#9aa0ac;--accent:#8b95ff;
        --border:#272b36;--sidebar:#151823;--code-bg:#1e222e;--hl:#6b5618;}
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;font-family:-apple-system,"Segoe UI","Malgun Gothic",system-ui,sans-serif;
       background:var(--bg);color:var(--fg);line-height:1.75;}
  #progress{position:fixed;top:0;left:0;height:3px;background:var(--accent);width:0;z-index:100;}
  .wrap{display:flex;min-height:100vh;}
  aside{width:290px;flex:none;background:var(--sidebar);border-right:1px solid var(--border);
        position:sticky;top:0;height:100vh;overflow-y:auto;padding:1.25rem 1rem;}
  main{flex:1;min-width:0;max-width:920px;margin:0 auto;padding:2rem 2.6rem 6rem;}
  .doc-title{font-weight:700;font-size:1.05rem;margin:.2rem 0 1rem;line-height:1.4;}
  .search{width:100%;padding:.5rem .7rem;border:1px solid var(--border);border-radius:8px;
          background:var(--bg);color:var(--fg);margin-bottom:.4rem;font-size:.9rem;}
  .scount{font-size:.75rem;color:var(--muted);margin:0 0 .8rem .2rem;min-height:1em;}
  nav a{display:block;padding:.3rem .6rem;border-radius:6px;color:var(--muted);
        text-decoration:none;font-size:.88rem;border-left:2px solid transparent;}
  nav a.lv3{padding-left:1.5rem;font-size:.82rem;}
  nav a:hover{background:var(--bg);color:var(--fg);}
  nav a.active{color:var(--accent);border-left-color:var(--accent);background:var(--bg);font-weight:600;}
  .topbar{display:flex;align-items:center;gap:.75rem;margin-bottom:.4rem;}
  .src{font-size:.8rem;color:var(--muted);}
  .toggle{margin-left:auto;cursor:pointer;border:1px solid var(--border);background:var(--bg);
          color:var(--fg);border-radius:8px;padding:.35rem .65rem;font-size:.85rem;}
  h1{font-size:2rem;border-bottom:3px solid var(--accent);padding-bottom:.4rem;margin:.4rem 0 1.2rem;}
  section.sec{border-bottom:1px solid var(--border);padding:.2rem 0 1rem;}
  section.sec h2{font-size:1.4rem;cursor:pointer;display:flex;align-items:center;gap:.55rem;
                 user-select:none;margin:1.3rem 0 .6rem;}
  section.sec h2::before{content:"▾";color:var(--accent);font-size:.85rem;transition:transform .15s;}
  section.collapsed h2::before{transform:rotate(-90deg);}
  section.collapsed .body{display:none;}
  h3{font-size:1.13rem;color:var(--accent);margin-top:1.5rem;}
  table{border-collapse:collapse;width:100%;margin:1rem 0;font-size:.92rem;}
  th,td{border:1px solid var(--border);padding:.5rem .7rem;text-align:left;vertical-align:top;}
  th{background:var(--code-bg);font-weight:600;}
  tbody tr:nth-child(even) td{background:color-mix(in srgb,var(--code-bg) 45%,transparent);}
  code{background:var(--code-bg);padding:.15rem .4rem;border-radius:4px;
       font-family:"Cascadia Code",Consolas,monospace;font-size:.9em;}
  pre{background:var(--code-bg);padding:1rem;border-radius:8px;overflow-x:auto;border:1px solid var(--border);}
  pre code{background:none;padding:0;}
  blockquote{border-left:4px solid var(--accent);margin:1rem 0;padding:.3rem 1rem;
             background:color-mix(in srgb,var(--accent) 8%,transparent);color:var(--muted);}
  mark.s{background:var(--hl);color:inherit;border-radius:3px;}
  .hidden{display:none!important;}
  #top{position:fixed;right:1.5rem;bottom:1.5rem;background:var(--accent);color:#fff;border:none;
       border-radius:50%;width:46px;height:46px;cursor:pointer;font-size:1.2rem;opacity:0;
       transition:opacity .2s;box-shadow:0 2px 10px rgba(0,0,0,.2);}
  #top.show{opacity:.92;}
  #hamb{display:none;}
  @media(max-width:820px){
    aside{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:transform .2s;}
    aside.open{transform:none;box-shadow:3px 0 16px rgba(0,0,0,.25);}
    #hamb{display:inline-flex;position:fixed;top:.8rem;left:.8rem;z-index:60;background:var(--accent);
          color:#fff;border:none;border-radius:8px;padding:.45rem .7rem;cursor:pointer;font-size:1rem;}
    main{padding:3.4rem 1.2rem 6rem;}
  }
</style>
</head>
<body>
<div id="progress"></div>
<button id="hamb" aria-label="목차 열기">☰</button>
<div class="wrap">
  <aside id="sidebar">
    <div class="doc-title">{{TITLE}}</div>
    <input class="search" id="search" placeholder="🔍 문서 내 검색…" autocomplete="off">
    <div class="scount" id="scount"></div>
    <nav id="toc"></nav>
  </aside>
  <main>
    <div class="topbar">
      <span class="src">{{SOURCE}}</span>
      <button class="toggle" id="theme">🌙 다크</button>
    </div>
    <div id="content">
{{CONTENT}}
    </div>
  </main>
</div>
<button id="top" aria-label="맨 위로">↑</button>
<script>
(function(){
  const content=document.getElementById('content');
  const toc=document.getElementById('toc');

  // 1) h2 기준으로 본문을 접을 수 있는 <section>으로 묶는다
  const kids=[...content.children];
  const frag=document.createDocumentFragment();
  let body=null;
  kids.forEach(el=>{
    if(el.tagName==='H2'){
      const sec=document.createElement('section');sec.className='sec';
      body=document.createElement('div');body.className='body';
      sec.appendChild(el);sec.appendChild(body);
      frag.appendChild(sec);
    }else if(body && el.tagName!=='H1'){
      body.appendChild(el);
    }else{
      frag.appendChild(el);
    }
  });
  content.innerHTML='';content.appendChild(frag);

  // 2) 목차 자동 생성 (h2 + h3) + id 부여
  const heads=[...content.querySelectorAll('h2, h3')];
  heads.forEach((h,i)=>{
    h.id='h-'+i;
    const a=document.createElement('a');
    a.href='#'+h.id;a.textContent=h.textContent;
    if(h.tagName==='H3')a.className='lv3';
    a.dataset.target=h.id;
    toc.appendChild(a);
  });

  // 3) 섹션 접기/펼치기 (목차 클릭 시 점프는 막지 않도록 헤딩 자체만 토글)
  content.querySelectorAll('section.sec > h2').forEach(h2=>{
    h2.addEventListener('click',()=>h2.parentElement.classList.toggle('collapsed'));
  });

  // 4) 스크롤스파이 — 현재 보이는 헤딩을 목차에서 강조
  const links=[...toc.querySelectorAll('a')];
  const map={};links.forEach(a=>map[a.dataset.target]=a);
  const obs=new IntersectionObserver(es=>{
    es.forEach(e=>{
      if(e.isIntersecting){
        links.forEach(a=>a.classList.remove('active'));
        const a=map[e.target.id];if(a)a.classList.add('active');
      }
    });
  },{rootMargin:'0px 0px -75% 0px',threshold:0});
  heads.forEach(h=>obs.observe(h));

  // 5) 검색 — 섹션 필터 + 매칭 하이라이트
  const search=document.getElementById('search');
  const scount=document.getElementById('scount');
  const secs=[...content.querySelectorAll('section.sec')];
  function clearMarks(){
    content.querySelectorAll('mark.s').forEach(m=>{m.replaceWith(document.createTextNode(m.textContent));});
    content.normalize();
  }
  function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
  search.addEventListener('input',()=>{
    const q=search.value.trim();
    clearMarks();
    if(!q){
      secs.forEach(s=>s.classList.remove('hidden','collapsed'));
      links.forEach(a=>a.classList.remove('hidden'));
      scount.textContent='';return;
    }
    const rx=new RegExp('('+esc(q)+')','gi');
    let hit=0;
    secs.forEach(s=>{
      const match=s.textContent.toLowerCase().includes(q.toLowerCase());
      s.classList.toggle('hidden',!match);
      if(match){
        hit++;s.classList.remove('collapsed');
        const walker=document.createTreeWalker(s,NodeFilter.SHOW_TEXT);
        const tn=[];let n;while(n=walker.nextNode())tn.push(n);
        tn.forEach(t=>{
          if(!rx.test(t.nodeValue))return;rx.lastIndex=0;
          const span=document.createElement('span');
          span.innerHTML=t.nodeValue.replace(rx,'<mark class="s">$1</mark>');
          t.replaceWith(span);
        });
      }
    });
    // 목차도 동기화
    links.forEach(a=>{
      const h=document.getElementById(a.dataset.target);
      const sec=h.closest('section.sec');
      a.classList.toggle('hidden', sec?sec.classList.contains('hidden'):false);
    });
    scount.textContent=hit?`${hit}개 섹션 일치`:'일치하는 내용 없음';
  });

  // 6) 다크모드 토글 (기억)
  const theme=document.getElementById('theme');
  const root=document.documentElement;
  function setTheme(t){root.setAttribute('data-theme',t);theme.textContent=t==='dark'?'☀️ 라이트':'🌙 다크';
    try{localStorage.setItem('gdd-theme',t);}catch(e){}}
  try{const saved=localStorage.getItem('gdd-theme');if(saved)setTheme(saved);}catch(e){}
  theme.addEventListener('click',()=>setTheme(root.getAttribute('data-theme')==='dark'?'light':'dark'));

  // 7) 진행바 + 맨 위로 버튼
  const prog=document.getElementById('progress');
  const top=document.getElementById('top');
  window.addEventListener('scroll',()=>{
    const h=document.documentElement;
    const sc=h.scrollTop/(h.scrollHeight-h.clientHeight)*100;
    prog.style.width=sc+'%';
    top.classList.toggle('show',h.scrollTop>400);
  });
  top.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

  // 8) 모바일 햄버거
  const hamb=document.getElementById('hamb');const sidebar=document.getElementById('sidebar');
  hamb.addEventListener('click',()=>sidebar.classList.toggle('open'));
  toc.addEventListener('click',()=>{if(window.innerWidth<=820)sidebar.classList.remove('open');});
})();
</script>
</body>
</html>
